name: Update OSS contributions

on:
  schedule:
    # Daily at 06:00 UTC (01:00 AM Tampa / EST)
    - cron: "0 6 * * *"
  workflow_dispatch: {}        # lets you run it manually from the Actions tab
  push:
    branches: [main]
    paths:
      - "scripts/update_oss_contributions.py"
      - ".github/workflows/update-oss.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/update_oss_contributions.py

      - name: Commit changes
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: refresh open source contributions [skip ci]"
            git push
          else
            echo "Nothing to commit."
          fi